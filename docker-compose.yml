services:
  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: pluribus
      MYSQL_USER: pluribus
      MYSQL_PASSWORD: pluribus_secret
      MYSQL_ROOT_PASSWORD: pluribus_root_secret
    ports:
      - "9121:3306"
    restart: unless-stopped
    volumes:
      # Named volume: data survives container rebuilds and `docker compose down`.
      # Wiped only if you remove this volume, e.g. `docker compose down -v` or
      # `docker volume rm pluribus_db_data`.
      - db_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -upluribus -ppluribus_secret || exit 1",
        ]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 15s

  phpmyadmin:
    image: mirror.gcr.io/phpmyadmin/phpmyadmin:latest
    ports:
      - "9124:80"
    environment:
      PMA_HOST: db
      PMA_USER: pluribus
      PMA_PASSWORD: pluribus_secret
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "9122:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "9123:9123"
    environment:
      VITE_API_BASE_URL: http://localhost:9122
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 9123"
    depends_on:
      - api

volumes:
  db_data:
    name: pluribus_db_data
  frontend_node_modules:
